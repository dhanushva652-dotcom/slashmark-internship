
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sentiment Analysis Tool</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f6f7fb; color: #1f2937; }
    .wrap { max-width: 900px; margin: 40px auto; padding: 24px; }
    .card { background: white; border-radius: 18px; padding: 24px; box-shadow: 0 8px 30px rgba(0,0,0,.08); }
    textarea { width: 100%; min-height: 140px; border: 1px solid #d1d5db; border-radius: 12px; padding: 14px; font-size: 16px; box-sizing: border-box; }
    button { background: #111827; color: white; border: 0; padding: 12px 18px; border-radius: 12px; font-size: 15px; cursor: pointer; margin-top: 12px; }
    .result { margin-top: 18px; padding: 14px; border-radius: 12px; background: #eef2ff; }
    .muted { color: #6b7280; }
    .examples button { margin-right: 8px; margin-top: 8px; background: #374151; }
    h1 { margin-top: 0; }
    code { background: #f3f4f6; padding: 2px 6px; border-radius: 6px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Sentiment Analysis Tool</h1>
      <p class="muted">Classifies text as Positive, Neutral, or Negative using TF-IDF + classical ML.</p>

      <textarea id="review" placeholder="Type a restaurant review, product review, or social post here..."></textarea>
      <br />
      <button onclick="predict()">Predict Sentiment</button>

      <div class="examples">
        <p class="muted">Quick examples:</p>
        <button onclick="setExample('The food was amazing and the service was excellent!')">Positive</button>
        <button onclick="setExample('The service was okay. Nothing special but not bad either.')">Neutral</button>
        <button onclick="setExample('Terrible experience. Food was cold and the waiter was rude.')">Negative</button>
      </div>

      <div id="result" class="result" style="display:none;"></div>
    </div>
  </div>

  <script>
    function setExample(text) {
      document.getElementById('review').value = text;
    }

    async function predict() {
      const review = document.getElementById('review').value;
      const resultBox = document.getElementById('result');
      resultBox.style.display = 'block';
      resultBox.innerHTML = 'Predicting...';

      const response = await fetch('/predict', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ review })
      });

      const data = await response.json();
      if (!response.ok) {
        resultBox.innerHTML = `<b>Error:</b> ${data.error || 'Something went wrong'}`;
        return;
      }

      resultBox.innerHTML = `
        <b>Sentiment:</b> ${data.sentiment}<br>
        <b>Prediction:</b> ${data.prediction}<br>
        <b>Confidence:</b> ${data.confidence}<br>
        <b>Cleaned Text:</b> <code>${data.cleaned_text}</code>
      `;
    }
  </script>
</body>
</html>
